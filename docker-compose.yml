version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eightpod
      POSTGRES_PASSWORD: eightpod
      POSTGRES_DB: eightpod
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eightpod']
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://eightpod:eightpod@db:5432/eightpod
      NEXTAUTH_SECRET: 8pod-local-dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
